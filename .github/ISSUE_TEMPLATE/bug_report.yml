name: 🐛 Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill out the details below so we can reproduce and fix the issue.

  - type: dropdown
    id: variant
    attributes:
      label: Image Variant
      options:
        - Full (latest / dev)
        - Slim (slim / dev-slim)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Image Tag / Version
      description: "e.g. latest, dev, v1.0.0"
      placeholder: "latest"
    validations:
      required: true

  - type: dropdown
    id: host-os
    attributes:
      label: Host OS
      options:
        - Linux
        - macOS (Docker Desktop)
        - Windows (Docker Desktop / WSL2)
        - Synology / NAS
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: compose
    attributes:
      label: Docker Compose / Run command
      description: Your compose file or docker run command (redact API keys)
      render: yaml

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error output
      description: Paste relevant container logs
      render: shell
